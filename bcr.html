<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Minh CAPTCHA & IP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial; text-align: center; background: #111; color: white; padding: 20px; }
        canvas { border: 4px solid #00ff00; border-radius: 15px; background: #222; box-shadow: 0 0 15px #00ff00; }
        input { padding: 15px; font-size: 22px; width: 85%; margin: 15px; text-align: center; border-radius: 10px; }
        button { background: #00ff00; color: black; padding: 15px 30px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; margin: 10px; }
        #status { font-size: 18px; margin: 15px; font-weight: bold; }
        .refresh { background: #ff8800; }
    </style>
</head>
<body>
    <h2>🔒 XÁC MINH CAPTCHA & IP</h2>
    <p>Nhập đúng mã CAPTCHA để tiếp tục</p>
    
    <canvas id="captcha" width="250" height="80"></canvas><br>
    <input type="text" id="captcha-input" placeholder="Nhập mã CAPTCHA" maxlength="6">
    <br>
    <button onclick="verifyCaptcha()">✅ Xác Thực</button>
    <button class="refresh" onclick="generateCaptcha()">🔄 Làm mới CAPTCHA</button>
    
    <p id="status"></p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.MainButton.hide();

        let user_id = tg.initDataUnsafe?.user?.id || null;
        let captchaCode = "";

        function generateCaptcha() {
            const canvas = document.getElementById("captcha");
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, 250, 80);
            
            // Nền
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(0, 0, 250, 80);
            
            // Mã CAPTCHA
            captchaCode = Math.random().toString(36).substring(2, 8).toUpperCase();
            
            // Vẽ chữ rõ nét hơn
            ctx.font = "bold 38px Arial";
            ctx.textBaseline = "middle";
            ctx.textAlign = "center";
            ctx.fillStyle = "#00ff00";
            ctx.shadowColor = "#00ff00";
            ctx.shadowBlur = 8;
            ctx.fillText(captchaCode, 125, 42);
            
            // Nhiễu mạnh hơn
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 2;
            for (let i = 0; i < 12; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * 250, Math.random() * 80);
                ctx.lineTo(Math.random() * 250, Math.random() * 80);
                ctx.stroke();
            }
            
            // Nhiễu chấm
            ctx.fillStyle = "#ffffff";
            for (let i = 0; i < 30; i++) {
                ctx.fillRect(Math.random() * 250, Math.random() * 80, 2, 2);
            }
        }

        function verifyCaptcha() {
            const input = document.getElementById("captcha-input").value.trim().toUpperCase();
            const status = document.getElementById("status");

            if (input !== captchaCode) {
                status.innerHTML = "❌ CAPTCHA SAI! Vui lòng thử lại.";
                generateCaptcha();
                return;
            }

            if (!user_id) {
                status.innerHTML = "❌ Lỗi: Hãy mở link này TRONG Telegram!";
                return;
            }

            status.innerHTML = "✅ CAPTCHA đúng!<br>Đang lấy IP...";

            fetch("https://api.ipify.org?format=json")
                .then(res => res.json())
                .then(data => {
                    const payload = { action: "ip_verify", user_id: user_id, ip: data.ip };
                    tg.sendData(JSON.stringify(payload));
                    status.innerHTML = "✅ Xác minh thành công!<br>Đang đóng cửa sổ...";
                    setTimeout(() => tg.close(), 800);
                })
                .catch(() => {
                    status.innerHTML = "❌ Lỗi lấy IP. Thử lại sau!";
                });
        }

        // Tự động tạo CAPTCHA khi load (đã fix lỗi không hiện)
        window.onload = () => {
            generateCaptcha();
            if (!user_id) {
                document.getElementById("status").innerHTML = "⚠️ Hãy mở trong Telegram Mini App để lấy User ID!";
            }
        };
    </script>
</body>
</html>
