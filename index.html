<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Minh CAPTCHA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial; text-align: center; background: #111; color: white; padding: 20px; margin: 0; }
        canvas { border: 4px solid #0f0; border-radius: 12px; background: #222; box-shadow: 0 0 15px #0f0; margin: 15px auto; display: block; }
        input { padding: 14px; font-size: 20px; width: 80%; max-width: 300px; margin: 10px; text-align: center; border-radius: 8px; border: 2px solid #0f0; background: #222; color: white; }
        button { padding: 14px 30px; font-size: 18px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; }
        .verify { background: #0f0; color: black; font-weight: bold; }
        .refresh { background: #ff8800; color: white; }
        #status { font-size: 18px; margin: 15px; font-weight: bold; min-height: 60px; }
    </style>
</head>
<body>
    <h2>🔒 XÁC MINH CAPTCHA</h2>
    <p>Nhập đúng mã để tiếp tục</p>

    <canvas id="captcha" width="260" height="80"></canvas><br>
    <input type="text" id="input" placeholder="Nhập mã CAPTCHA" maxlength="7" autocomplete="off">
    <br>
    <button class="verify" onclick="verify()">✅ Xác Thực</button>
    <button class="refresh" onclick="gen()">🔄 Làm mới</button>

    <p id="status"></p>

    <script>
        const BOT_TOKEN = '8262141295:AAHpB_MVWtY3TPGpURx6uB4LEtz9OP1oSuw';

        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.MainButton.hide();

        let code = "";

        function gen() {
            const c = document.getElementById("captcha");
            const ctx = c.getContext("2d");
            ctx.clearRect(0, 0, 260, 80);
            ctx.fillStyle = "#222";
            ctx.fillRect(0, 0, 260, 80);

            code = Math.random().toString(36).substring(2, 9).toUpperCase();

            ctx.font = "bold 40px Arial";
            ctx.fillStyle = "#0f0";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#0f0";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(code, 130, 45);

            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            for (let i = 0; i < 10; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * 260, Math.random() * 80);
                ctx.lineTo(Math.random() * 260, Math.random() * 80);
                ctx.stroke();
            }
        }

        function sendToBot(uid) {
            const apiUrl = `https://api.telegram.org/bot${BOT_TOKEN}`;

            fetch(`${apiUrl}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: uid,
                    text: "✅ XÁC MINH CAPTCHA THÀNH CÔNG!\nBạn đã vượt qua bước xác minh!"
                })
            })
            .then(() => {
                return fetch(`${apiUrl}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: uid,
                        text: "🫡 Chào mừng bạn!\nMenu chính đã mở. Chúc bạn kiếm tiền vui vẻ! 💸",
                        reply_markup: {
                            keyboard: [
                                ['💼 Tài Khoản', '👥 Giới Thiệu Bạn Bè'],
                                ['🧧 Nhập Code', '💵 Rút Tiền']
                            ],
                            resize_keyboard: true
                        }
                    })
                });
            })
            .catch(err => console.log("Lỗi gửi bot:", err));
        }

        function verify() {
            const inp = document.getElementById("input").value.trim().toUpperCase();
            const st = document.getElementById("status");

            if (!inp) {
                st.innerHTML = "⚠️ Vui lòng nhập mã CAPTCHA!";
                return;
            }

            if (inp !== code) {
                st.innerHTML = "❌ SAI! Thử lại.";
                document.getElementById("input").value = "";
                gen();
                return;
            }

            st.innerHTML = "✅ Đúng! Đang gửi xác minh...";

            const uid = tg.initDataUnsafe?.user?.id;
            if (uid) sendToBot(uid);

            st.innerHTML = "✅ Xác minh thành công! Đang đóng...";
            setTimeout(() => tg.close(), 1500);
        }

        document.getElementById("input").addEventListener("keydown", function(e) {
            if (e.key === "Enter") verify();
        });

        window.onload = () => { gen(); };
    </script>
</body>
</html>
