<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Minh CAPTCHA & IP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial; text-align: center; background: #111; color: white; padding: 20px; }
        canvas { border: 4px solid #00ff00; border-radius: 15px; background: #222; box-shadow: 0 0 20px #00ff00; }
        input { padding: 15px; font-size: 22px; width: 85%; margin: 15px; text-align: center; border-radius: 10px; }
        button { background: #00ff00; color: black; padding: 15px 30px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; margin: 10px; }
        #status { font-size: 18px; margin: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>🔒 XÁC MINH CAPTCHA & IP</h2>
    <p>Nhập đúng mã CAPTCHA để tiếp tục</p>
    
    <canvas id="captcha" width="250" height="80"></canvas><br>
    <input type="text" id="captcha-input" placeholder="Nhập mã CAPTCHA" maxlength="6">
    <br>
    <button onclick="verifyCaptcha()">✅ Xác Thực</button>
    <button onclick="generateCaptcha()">🔄 Làm mới</button>
    
    <p id="status"></p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand(); tg.MainButton.hide();

        let user_id = tg.initDataUnsafe?.user?.id || null;
        let captchaCode = "";

        function generateCaptcha() {
            const canvas = document.getElementById("captcha");
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, 250, 80);
            ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0, 0, 250, 80);
            captchaCode = Math.random().toString(36).substring(2, 8).toUpperCase();
            ctx.font = "bold 38px Arial";
            ctx.fillStyle = "#00ff00";
            ctx.shadowBlur = 10; ctx.shadowColor = "#00ff00";
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(captchaCode, 125, 42);
            // nhiễu
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
            for (let i = 0; i < 12; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random()*250, Math.random()*80);
                ctx.lineTo(Math.random()*250, Math.random()*80);
                ctx.stroke();
            }
        }

        function verifyCaptcha() {
            const input = document.getElementById("captcha-input").value.trim().toUpperCase();
            const status = document.getElementById("status");
            if (input !== captchaCode) {
                status.innerHTML = "❌ CAPTCHA SAI! Thử lại.";
                generateCaptcha();
                return;
            }
            if (!user_id) {
                status.innerHTML = "❌ Mở trong Telegram để xác minh!";
                return;
            }
            status.innerHTML = "✅ CAPTCHA đúng!<br>Đang lấy IP...";
            fetch("https://api.ipify.org?format=json")
                .then(r => r.json())
                .then(data => {
                    tg.sendData(JSON.stringify({action: "ip_verify", user_id: user_id, ip: data.ip}));
                    status.innerHTML = "✅ Thành công! Đang đóng...";
                    setTimeout(() => tg.close(), 800);
                })
                .catch(() => status.innerHTML = "❌ Lỗi lấy IP, thử lại!");
        }

        window.onload = () => {
            generateCaptcha();
            if (!user_id) document.getElementById("status").innerHTML = "⚠️ Mở link này TRONG Telegram!";
        };
    </script>
</body>
</html>
