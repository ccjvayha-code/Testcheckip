<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xác Minh</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { background:#111; color:white; text-align:center; font-family:Arial }
canvas { border:3px solid #0f0; margin-top:20px }
input { padding:10px; font-size:18px; margin:10px }
button { padding:10px 20px; font-size:16px; margin:5px }
</style>
</head>

<body>

<h2>🔒 CAPTCHA</h2>

<canvas id="captcha" width="250" height="80"></canvas><br>
<input id="input" placeholder="Nhập captcha">
<br>
<button onclick="verify()">Xác Thực</button>

<p id="status"></p>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let captcha = "";
let user_id = tg.initDataUnsafe?.user?.id;

function gen() {
    const c = document.getElementById("captcha");
    const ctx = c.getContext("2d");

    ctx.fillStyle = "#000";
    ctx.fillRect(0,0,250,80);

    captcha = Math.random().toString(36).substring(2,8).toUpperCase();

    ctx.fillStyle = "#0f0";
    ctx.font = "30px Arial";
    ctx.fillText(captcha, 60, 50);
}

function verify() {
    let input = document.getElementById("input").value.toUpperCase();

    if(input !== captcha){
        document.getElementById("status").innerHTML = "❌ Sai captcha";
        gen();
        return;
    }

    if(!user_id){
        alert("MỞ TRONG TELEGRAM!");
        return;
    }

    document.getElementById("status").innerHTML = "Đang xác minh...";

    fetch("https://api.ipify.org?format=json")
    .then(res=>res.json())
    .then(data=>{
        let payload = {
            action: "ip_verify",
            user_id: user_id,
            ip: data.ip
        };

        console.log("GỬI:", payload);

        tg.sendData(JSON.stringify(payload));

        document.getElementById("status").innerHTML = "✅ Thành công!";

        setTimeout(()=>{
            tg.close();
        }, 2000); // QUAN TRỌNG
    });
}

gen();
</script>

</body>
</html>
