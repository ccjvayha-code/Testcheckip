<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Minh CAPTCHA & IP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial; text-align: center; background: #111; color: white; padding: 20px; margin: 0; }
        canvas { border: 4px solid #0f0; border-radius: 12px; background: #222; box-shadow: 0 0 15px #0f0; margin: 15px auto; display: block; }
        input { padding: 14px; font-size: 20px; width: 80%; max-width: 300px; margin: 10px; text-align: center; border-radius: 8px; border: 2px solid #0f0; background: #222; color: white; }
        button { padding: 14px 30px; font-size: 18px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; }
        .verify { background: #0f0; color: black; }
        .refresh { background: #ff8800; color: white; }
        #status { font-size: 18px; margin: 15px; font-weight: bold; min-height: 60px; }
    </style>
</head>
<body>
    <h2>🔒 XÁC MINH CAPTCHA & IP</h2>
    <p>Nhập đúng mã để tiếp tục</p>

    <canvas id="captcha" width="260" height="80"></canvas><br>
    <input type="text" id="input" placeholder="Nhập mã CAPTCHA" maxlength="7" autocomplete="off">
    <br>
    <button class="verify" onclick="verify()">✅ Xác Thực</button>
    <button class="refresh" onclick="gen()">🔄 Làm mới</button>

    <p id="status"></p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand(); tg.MainButton.hide();

        let uid = tg.initDataUnsafe?.user?.id || null;
        let code = "";

        function gen() {
            const c = document.getElementById("captcha");
            const ctx = c.getContext("2d");
            ctx.clearRect(0, 0, 260, 80);
            ctx.fillStyle = "#222"; ctx.fillRect(0, 0, 260, 80);

            code = Math.random().toString(36).substring(2, 9).toUpperCase();

            ctx.font = "bold 40px Arial";
            ctx.fillStyle = "#0f0";
            ctx.shadowBlur = 10; ctx.shadowColor = "#0f0";
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(code, 130, 45);

            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
            for (let i = 0; i < 10; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random()*260, Math.random()*80);
                ctx.lineTo(Math.random()*260, Math.random()*80);
                ctx.stroke();
            }
        }

        function verify() {
            const inp = document.getElementById("input").value.trim().toUpperCase();
            const st = document.getElementById("status");

            if (inp !== code) {
                st.innerHTML = "❌ SAI! Thử lại.";
                gen();
                return;
            }

            if (!uid) {
                st.innerHTML = "❌ Mở trong Telegram!";
                return;
            }

            st.innerHTML = "✅ Đúng! Đang lấy IP...";

            fetch("https://api.ipify.org?format=json")
                .then(r => r.json())
                .then(d => {
                    tg.sendData(JSON.stringify({action: "ip_verify", user_id: uid, ip: d.ip}));
                    st.innerHTML = "✅ Xác minh thành công! Đóng cửa sổ...";
                    setTimeout(() => tg.close(), 1000);
                })
                .catch(() => st.innerHTML = "❌ Lỗi lấy IP!");
        }

        window.onload = () => {
            gen();
            if (!uid) document.getElementById("status").innerHTML = "⚠️ Mở trong Telegram!";
        };
    </script>
</body>
</html>
